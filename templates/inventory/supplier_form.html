{% extends 'base.html' %}

{% block title %}{% if supplier %}Rediger{% else %}Ny{% endif %} leverandør{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1>{% if supplier %}Rediger leverandør{% else %}Ny leverandør{% endif %}</h1>
</div>

<div class="card">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">Navn *</label>
                    <input type="text" name="name" class="form-control" 
                           value="{{ supplier.name|default:'' }}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Kontaktperson</label>
                    <input type="text" name="contact_person" class="form-control" 
                           value="{{ supplier.contact_person|default:'' }}">
                </div>
            </div>
            
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">E-post</label>
                    <input type="email" name="email" class="form-control" 
                           value="{{ supplier.email|default:'' }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Telefon</label>
                    <input type="tel" name="phone" class="form-control" 
                           value="{{ supplier.phone|default:'' }}">
                </div>
            </div>
            
            {% if supplier %}
            <div class="mb-3">
                <label class="form-label">Adresse</label>
                <textarea name="address" class="form-control" rows="2">{{ supplier.address|default:'' }}</textarea>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Notater</label>
                <textarea name="notes" class="form-control" rows="2">{{ supplier.notes|default:'' }}</textarea>
            </div>
            {% endif %}
            
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-lg"></i> Lagre
                </button>
                <a href="{% url 'inventory:supplier_list' %}" class="btn btn-secondary">Avbryt</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
