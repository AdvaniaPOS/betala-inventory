<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under utvikling - Advania</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .error-container {
            text-align: center;
            padding: 3rem;
            background: white;
            border-radius: 1rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            max-width: 500px;
        }
        .advania-logo {
            width: 200px;
            margin-bottom: 2rem;
        }
        .error-icon {
            font-size: 4rem;
            color: #6c757d;
            margin-bottom: 1rem;
        }
        h1 {
            color: #333;
            font-weight: 600;
            margin-bottom: 1rem;
        }
        p {
            color: #666;
            font-size: 1.1rem;
        }
        .btn-primary {
            background-color: #00509e;
            border-color: #00509e;
            padding: 0.75rem 2rem;
            font-size: 1rem;
        }
        .btn-primary:hover {
            background-color: #003d7a;
            border-color: #003d7a;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <img src="https://www.advania.is/library/Template/logo.svg" alt="Advania" class="advania-logo" 
             onerror="this.style.display='none'">
        <div class="error-icon">🚧</div>
        <h1>Under utvikling</h1>
        <p>
            Denne funksjonen er under utvikling og vil snart være tilgjengelig.
        </p>
        <p class="text-muted small mb-4">
            Ta kontakt med support hvis dette er uventet.
        </p>
        <a href="/" class="btn btn-primary">
            <i class="bi bi-house"></i> Tilbake til forsiden
        </a>
    </div>
</body>
</html>
